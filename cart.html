<!DOCTYPE html>
<html>
<head>
<title>💙 My Cart</title>

<style>
body{
    font-family:Arial;
    background:#e6f2ff;
    padding:20px;
}

h1{
    color:#0066cc;
}

.cart-item{
    background:white;
    padding:15px;
    margin-bottom:10px;
    border-radius:10px;
    box-shadow:0 0 5px rgba(0,0,0,0.1);
}

.total{
    font-size:22px;
    font-weight:bold;
    color:#0066cc;
    margin-top:20px;
}

.remove-btn{
    background:red;
    color:white;
    border:none;
    padding:10px;
    border-radius:5px;
    cursor:pointer;
}

.order-btn{
    background:#2196F3;
    color:white;
    border:none;
    padding:12px;
    border-radius:5px;
    cursor:pointer;
    margin-top:20px;
}
</style>
</head>

<body>

<h1>💙 My Cart 💙</h1>

<div id="cart"></div>

<div class="total">
Total: ₹<span id="total">0</span>
</div>

<br>

<button class="order-btn" onclick="placeOrder()">
✅ Place Order
</button>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let cartDiv = document.getElementById("cart");

let total = 0;

cart.forEach((item,index) => {

    total += item.price;

    cartDiv.innerHTML += `
    <div class="cart-item">
        <h3>${item.name}</h3>
        <p>₹${item.price}</p>

        <button class="remove-btn" onclick="removeItem(${index})">
            ❌ Remove
        </button>

    </div>
    `;

});

document.getElementById("total").innerText = total;

function removeItem(index){

    cart.splice(index,1);

    localStorage.setItem("cart", JSON.stringify(cart));

    location.reload();

}

function placeOrder(){

    localStorage.removeItem("cart");

    window.location.href = "success.html";

}

</script>

</body>
</html>
